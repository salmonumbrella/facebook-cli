# lefthook.yml
# Pre-commit and pre-push hooks

pre-commit:
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: bunx oxlint -c ./.oxlintrc.json {staged_files}
    format:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: bunx oxfmt --check --ignore-path .gitignore --ignore-path .oxfmtignore {staged_files}
